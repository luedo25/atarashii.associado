<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Professor</title>
    <script src="usuarios.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }

        /* CABEÇALHO / NAVBAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e293b;
            padding: 12px 24px;
            border-bottom: 2px solid #334155;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* GRUPO DE BOTÕES DE AÇÃO DO HEADER */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* BOTÕES DE AÇÃO (ATUALIZAR E SAIR) */
        .btn-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-atualizar {
            background-color: #3b82f6;
            color: #ffffff;
        }

        .btn-atualizar:hover {
            background-color: #2563eb;
        }

        .btn-sair {
            background-color: #ef4444;
            color: #ffffff;
        }

        .btn-sair:hover {
            background-color: #dc2626;
        }

        /* NAVEGAÇÃO POR ABAS */
        .tabs-nav {
            display: flex;
            gap: 8px;
            background-color: #0f172a;
            padding: 16px 24px 0 24px;
            max-width: 800px;
            margin: 0 auto;
        }

        .nav-btn {
            flex: 1;
            background-color: #1e293b;
            color: #94a3b8;
            border: none;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: #f8fafc;
            background-color: #334155;
        }

        .nav-btn.active {
            background-color: #2563eb;
            color: #ffffff;
        }

        /* CONTEÚDO DAS ABAS */
        .content-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .tab-content {
            display: none;
            background: #1e293b;
            padding: 20px;
            border-radius: 0 0 12px 12px;
        }

        .tab-content.active {
            display: block;
        }

        /* ESTILOS DA CHAMADA */
        .aluno-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #334155; 
        }

        input[type="date"] { 
            padding: 10px; 
            font-size: 16px; 
            margin-top: 6px;
            margin-bottom: 20px; 
            width: 100%; 
            border-radius: 6px; 
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .btn-salvar { 
            width: 100%; 
            padding: 12px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem;
        }

        .btn-salvar:hover {
            background: #2563eb;
        }

        /* CARD DE JUSTIFICATIVAS */
        .card-justificativas {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #94a3b8;
            text-align: center;
        }

        /* ESTILOS DA TABELA DE RESUMO DE FREQUÊNCIA */
        .tabela-resumo {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .tabela-resumo th, .tabela-resumo td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        .tabela-resumo th {
            background-color: #0f172a;
            color: #94a3b8;
            font-weight: bold;
        }

        .tabela-resumo tr:hover {
            background-color: #33415522;
        }

        .badge-porcentagem {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- CABEÇALHO / NAVBAR -->
    <header class="top-bar">
        <div class="logo-container">
            <img src="logo-associacao.png" alt="Logo Associação" class="logo-img">
            <span class="header-title">Área do Professor</span>
        </div>

        <!-- GRUPO DE BOTÕES (ATUALIZAR + SAIR) -->
        <div class="header-actions">
            <button onclick="location.reload()" class="btn-header btn-atualizar" title="Atualizar página">
                🔄 Atualizar
            </button>
            <a href="index.html" class="btn-header btn-sair" title="Sair do sistema">
                🚪 Sair
            </a>
        </div>
    </header>

    <!-- MENU DE ABAS -->
    <nav class="tabs-nav">
        <button class="nav-btn active" onclick="mudarAba('chamada', this)">
            📋 Chamada
        </button>
        <button class="nav-btn" onclick="mudarAba('justificativas', this)">
            📝 Justificativas
        </button>
        <button class="nav-btn" onclick="mudarAba('resumo', this)">
            📊 Resumo de Frequência
        </button>
    </nav>

    <!-- CONTEÚDO DAS ABAS -->
    <main class="content-container">

        <!-- ABA 1: CHAMADA -->
        <section id="aba-chamada" class="tab-content active">
            <h2 style="margin-bottom: 15px;">🥋 Chamada dos Alunos</h2>
            
            <label for="dataAula">Selecione a Data da Aula (Ter, Qui ou Sáb):</label>
            <input type="date" id="dataAula">

            <div id="listaAlunosContainer"></div>

            <button onclick="salvarChamada()" class="btn-salvar">💾 Salvar Chamada</button>
        </section>

        <!-- ABA 2: JUSTIFICATIVA DE FALTAS -->
        <section id="aba-justificativas" class="tab-content">
            <h2 style="margin-bottom: 15px;">📝 Pedidos de Justificativa de Faltas</h2>
            <div id="listaJustificativasProfessor">Carregando pedidos...</div>
        </section>

        <!-- ABA 3: RESUMO DE FREQUÊNCIA -->
        <section id="aba-resumo" class="tab-content">
            <h2 style="margin-bottom: 15px;">📊 Visão Geral de Frequência</h2>
            <div id="resumoFrequenciaContainer">Carregando relatório de frequência...</div>
        </section>

    </main>

    <script>
        // Proteção de acesso exclusivo para professor
        const usuarioAtivo = localStorage.getItem('usuarioAtivo');
        const tipoUsuario = localStorage.getItem('tipoUsuario');

        if (localStorage.getItem('associadoAutenticado') !== 'true' || (usuarioAtivo !== 'luiz.costa' && tipoUsuario !== 'professor')) {
            alert('Acesso restrito a professores.');
            window.location.replace('index.html');
        }

        const URL_API_SERVIDOR = "https://api-associacao-mp.onrender.com";

        // Define a data atual por padrão
        document.getElementById('dataAula').valueAsDate = new Date();

        // Função para alternar entre as abas
        function mudarAba(nomeAba, elementoBotao) {
            const abas = document.querySelectorAll('.tab-content');
            abas.forEach(aba => aba.classList.remove('active'));

            const botoes = document.querySelectorAll('.nav-btn');
            botoes.forEach(btn => btn.classList.remove('active'));

            const abaSelecionada = document.getElementById(`aba-${nomeAba}`);
            if (abaSelecionada) {
                abaSelecionada.classList.add('active');
            }

            if (elementoBotao) {
                elementoBotao.classList.add('active');
            }

            if (nomeAba === 'justificativas') {
                carregarJustificativasProfessor();
            } else if (nomeAba === 'resumo') {
                carregarResumoFrequencia();
            }
        }

        function renderizarAlunos() {
            const container = document.getElementById('listaAlunosContainer');
            container.innerHTML = '';

            // Filtra removendo administradores e pega os alunos de usuarios.js
            const alunos = listaAlunos.filter(u => u.usuario !== 'luiz.costa');

            alunos.forEach(aluno => {
                const div = document.createElement('div');
                div.className = 'aluno-item';
                div.innerHTML = `
                    <span>${aluno.nome}</span>
                    <label style="cursor: pointer;">
                        <input type="checkbox" data-usuario="${aluno.usuario}" class="chk-presente" checked> Presente
                    </label>
                `;
                container.appendChild(div);
            });
        }

        async function salvarChamada() {
            const data = document.getElementById('dataAula').value;
            if (!data) return alert("Selecione uma data.");

            const checkboxes = document.querySelectorAll('.chk-presente');
            const chamadas = Array.from(checkboxes).map(chk => ({
                usuario: chk.getAttribute('data-usuario'),
                presente: chk.checked
            }));

            try {
                const response = await fetch(`${URL_API_SERVIDOR}/api/chamada`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data, chamadas })
                });

                const result = await response.json();
                if (response.ok) {
                    alert("Chamada salva com sucesso!");
                } else {
                    alert("Erro: " + result.erro);
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Erro ao conectar ao servidor.");
            }
        }

        document.addEventListener('DOMContentLoaded', renderizarAlunos);

        // Nomes dos alunos mapeados do usuarios.js
        function obterNomeAluno(usuario) {
            const aluno = listaAlunos.find(u => u.usuario === usuario);
            return aluno ? aluno.nome : usuario;
        }

        async function carregarJustificativasProfessor() {
            const container = document.getElementById('listaJustificativasProfessor');
            try {
                const response = await fetch(`${URL_API_SERVIDOR}/api/justificativas`);
                const dados = await response.json();

                if (dados.length === 0) {
                    container.innerHTML = "<div class='card-justificativas'><p>Nenhum pedido de justificativa encontrado.</p></div>";
                    return;
                }

                container.innerHTML = dados.map(item => {
                    const ehPendente = item.status === 'pendente';
                    let corStatus = item.status === 'aprovado' ? '#10b981' : (item.status === 'reprovado' ? '#ef4444' : '#f59e0b');

                    return `
                        <div style="background: #0f172a; padding: 16px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 12px; text-align: left;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <strong style="font-size: 16px; color: #f8fafc;">🥋 ${obterNomeAluno(item.usuario)}</strong>
                                <span style="background: ${corStatus}22; color: ${corStatus}; border: 1px solid ${corStatus}; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase;">
                                    ${item.status}
                                </span>
                            </div>
                            <div style="font-size: 14px; color: #94a3b8; margin-bottom: 4px;"><strong>Data da Falta:</strong> ${item.data_falta.split('-').reverse().join('/')}</div>
                            <div style="font-size: 14px; color: #94a3b8; margin-bottom: 8px;"><strong>Motivo:</strong> ${item.motivo}</div>
                            <div style="font-size: 11px; color: #64748b; margin-bottom: 12px;">Enviado em: ${item.data_solicitacao}</div>

                            ${ehPendente ? `
                                <div style="display: flex; gap: 10px;">
                                    <button onclick="responderJustificativa(${item.id}, 'aprovado')" style="flex: 1; padding: 10px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">✅ Aprovar</button>
                                    <button onclick="responderJustificativa(${item.id}, 'reprovado')" style="flex: 1; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">❌ Reprovar</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = "<p style='color: #ef4444;'>Erro ao carregar justificativas.</p>";
            }
        }

        async function responderJustificativa(id, status) {
            if (!confirm(`Deseja alterar o status desta justificativa para ${status.toUpperCase()}?`)) return;

            try {
                const response = await fetch(`${URL_API_SERVIDOR}/api/justificativa/resposta`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status })
                });

                const result = await response.json();
                if (response.ok) {
                    alert(result.mensagem);
                    carregarJustificativasProfessor();
                } else {
                    alert("Erro: " + result.erro);
                }
            } catch (err) {
                alert("Erro na conexão com o servidor.");
            }
        }

        // CARREGAR RESUMO DE FREQUÊNCIA
        async function carregarResumoFrequencia() {
            const container = document.getElementById('resumoFrequenciaContainer');
            container.innerHTML = "<p style='color: #94a3b8;'>Buscando dados no servidor...</p>";

            try {
                const response = await fetch(`${URL_API_SERVIDOR}/api/chamada`);
                const registros = await response.json();

                const alunos = listaAlunos.filter(u => u.usuario !== 'luiz.costa');

                if (!registros || registros.length === 0) {
                    container.innerHTML = "<div class='card-justificativas'><p>Nenhuma chamada foi salva ainda.</p></div>";
                    return;
                }

                // Agrupa as chamadas por aluno
                let linhasHTML = '';

                alunos.forEach(aluno => {
                    const historicoAluno = registros.filter(r => r.usuario === aluno.usuario);
                    const totalAulas = historicoAluno.length;
                    
                    const presencas = historicoAluno.filter(r => r.presente).length;
                    const faltas = totalAulas - presencas;
                    
                    const pctPresenca = totalAulas > 0 ? ((presencas / totalAulas) * 100).toFixed(0) : 0;

                    let corBadge = '#10b981'; // Verde (alto)
                    if (pctPresenca < 75) corBadge = '#ef4444'; // Vermelho (baixo)
                    else if (pctPresenca < 85) corBadge = '#f59e0b'; // Amarelo (médio)

                    linhasHTML += `
                        <tr>
                            <td style="font-weight: bold; color: #f8fafc;">${aluno.nome}</td>
                            <td style="color: #10b981; font-weight: bold;">${presencas}</td>
                            <td style="color: #ef4444; font-weight: bold;">${faltas}</td>
                            <td>
                                <span class="badge-porcentagem" style="background: ${corBadge}22; color: ${corBadge}; border: 1px solid ${corBadge};">
                                    ${pctPresenca}% Presença
                                </span>
                            </td>
                        </tr>
                    `;
                });

                container.innerHTML = `
                    <table class="tabela-resumo">
                        <thead>
                            <tr>
                                <th>Aluno</th>
                                <th>Presenças</th>
                                <th>Faltas</th>
                                <th>Frequência</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${linhasHTML}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                console.error("Erro ao carregar frequência:", err);
                container.innerHTML = "<p style='color: #ef4444;'>Erro ao conectar com o servidor para buscar a frequência.</p>";
            }
        }
    </script>
</body>
</html>
