<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Painel do Aluno">
<link rel="apple-touch-icon" href="./atarashii-192.png">

<meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Área do Associado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            flex-direction: column; /* Alinha os elementos em coluna no mobile */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* Evita que o conteúdo cole nas bordas do celular */
        }

    /* CONFIGURAÇÃO DO LOGO CENTRALIZADO */
        .logo-associacao {
            width: 360px;         /* Tamanho do seu GIF */
            height: auto;
            margin: 0 auto 60px auto; /* Centraliza horizontalmente e dá espaço para o título abaixo */
            display: block;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        /* REGRAS EXCLUSIVAS PARA TELAS DE CELULAR (ATÉ 600px de largura) */
        @media (max-width: 600px) {
            body {
                justify-content: flex-start; /* Joga o conteúdo um pouco para cima */
                padding-top: 140px; /* Abre espaço para o GIF no topo */
            }

            .logo-associacao {
                position: absolute;
                left: 50%;
                transform: translateX(-50%); /* Centraliza o GIF perfeitamente na tela */
                top: 20px;
                width: 100px; /* Reduz ligeiramente o tamanho no celular */
            }

            .login-container {
                padding: 25px 20px; /* Diminui os espaçamentos internos para caber melhor */
            }
        }
    </style>
</head>
<body>
    <img src="ASSOCIAÇÃO-ATARASHII.gif" alt="Logo Associação Atarashii" class="logo-associacao">
	
	<button id="btnInstalarApp" style="display: none; width: 100%; margin-top: 15px; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
    📲 Instalar Aplicativo na Tela Inicial
</button>
	
    <div class="login-container">
        <h2>Área do Associado</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn-login">Entrar</button>
            <div id="errorMessage" class="error-message">Usuário ou senha incorretos.</div>
        </form>
    </div>
	
<script>
        const scriptUsuarios = document.createElement('script');
        const timestamp = new Date().getTime();
        
        // Carrega o arquivo com o marcador de tempo na URL
        scriptUsuarios.src = 'usuarios.js?v=' + timestamp;
        
        document.head.appendChild(scriptUsuarios);
    </script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const usuarioInput = document.getElementById('username').value;
            const senhaInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // Proteção extra: verifica se o arquivo usuarios.js já carregou na página
            if (typeof autenticarUsuarioDireto !== 'function') {
                alert('Carregando sistema de segurança... Por favor, tente novamente em um segundo.');
                return;
            }

            // Valida comparando direto com o arquivo limpo vindo do GitHub
            const alunoLogado = autenticarUsuarioDireto(usuarioInput, senhaInput);

            if (alunoLogado) {
                localStorage.setItem('associadoAutenticado', 'true');
                localStorage.setItem('nomeAlunoLogado', alunoLogado.nome);
                localStorage.setItem('usuarioAtivo', alunoLogado.usuario);
                window.location.href = 'area-associado.html';
            } else {
                errorMessage.style.display = 'block';
            }
        });
    </script>

<script>
    // 1. Registra o Service Worker obrigatorio
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker ativo.'))
            .catch((err) => console.log('Erro no SW:', err));
    }

    // CONTROLE - ANDROID (Botao de clique)
    let disparadorInstalacao = null;
    const botaoInstalarAndroid = document.getElementById('btnInstalarApp');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        disparadorInstalacao = e;
        // Mostra o botao verde apenas no Android
        if (botaoInstalarAndroid) {
            botaoInstalarAndroid.style.display = 'block';
        }
    });

    if (botaoInstalarAndroid) {
        botaoInstalarAndroid.addEventListener('click', async () => {
            if (!disparadorInstalacao) return;
            disparadorInstalacao.prompt();
            const { outcome } = await disparadorInstalacao.userChoice;
            disparadorInstalacao = null;
            botaoInstalarAndroid.style.display = 'none';
        });
    }

    // CONTROLE - IOS / IPHONE (Mensagem explicativa)
    function gerenciarPromptIOS() {
        // Detecta se eh um dispositivo iOS (iPhone, iPad, iPod)
        const ehIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        
        // Detecta se o site ja esta rodando como aplicativo instalado
        const jaEstaInstalado = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        // Se for iPhone e ainda nao estiver instalado, mostra o guia visual
        if (ehIOS && !jaEstaInstalado) {
            const promptIOS = document.getElementById('iosPrompt');
            if (promptIOS) {
                // Aguarda 3 segundos para a pagina carregar antes de mostrar o aviso suavemente
                setTimeout(() => {
                    promptIOS.style.display = 'block';
                }, 3000);
            }
        }
    }

    // Executa a checagem do iOS assim que a pagina carrega
    window.addEventListener('DOMContentLoaded', gerenciarPromptIOS);

    // Garante que tudo suma se o app ja estiver aberto em modo tela cheia
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        if (botaoInstalarAndroid) botaoInstalarAndroid.style.display = 'none';
        const promptIOS = document.getElementById('iosPrompt');
        if (promptIOS) promptIOS.style.display = 'none';
    }
</script>
	<!-- Pop-up customizado exclusivo para iPhones -->
<div id="iosPrompt" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; background-color: #ffffff; color: #333333; padding: 16px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 10000; border: 1px solid #e0e0e0; animation: slideUpIOS 0.4s ease;">
    <div style="display: flex; align-items: flex-start; gap: 12px;">
        <span style="font-size: 30px;">📲</span>
        <div>
            <h4 style="margin: 0 0 4px 0; color: #2c3e50; font-size: 15px;">Instalar no seu iPhone</h4>
            <p style="margin: 0; font-size: 13px; color: #555; line-height: 1.4;">
                Toque no ícone de <strong>Compartilhar</strong> <span style="font-size: 16px;">⎋</span> (na barra inferior do navegador clique nos 3 pontinhos ...) e depois selecione <strong>"Adicionar à Tela de Início"</strong>.
            </p>
        </div>
        <button onclick="document.getElementById('iosPrompt').style.display='none'" style="background: none; border: none; color: #999; font-size: 18px; cursor: pointer; padding: 0 5px;">✕</button>
    </div>
</div>

<style>
@keyframes slideUpIOS {
    from { opacity: 0; transform: translate(-50__, 20px); }
    to { opacity: 1; transform: translate(-50__, 0); }
}
</style>
</body>
</html>
